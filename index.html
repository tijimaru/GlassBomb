                    川崎病の影響で、心臓の血管(冠動脈)に炎症が起き、血管の壁が弱くなり<span class="highlight">冠動脈瘤</span>ができる。
                    <br>
                    瘤の部分の血管の血液の流れが滞ると血栓(血のかたまり)が発生し急性心筋梗塞を起こす可能性があるため、お薬や定期的な検査で管理しています
                </p>

                    血管や皮膚が傷ついた際かさぶたができにくかったり血管が塞がりにくいそのため、<span class="highlight">アザが出来やすく</span>、出血した際<span
                        class="highlight">血が止まりにくい</span>です。
                </p>
